name: Sync Skills

on:
  pull_request:
    paths:
      - 'package.json'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get odoo-client version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').dependencies['@marcfargas/odoo-client'].replace('^',''))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch skills from toolbox at matching tag
        run: |
          TAG="@marcfargas/odoo-client@${{ steps.version.outputs.version }}"
          echo "Fetching skills from tag: $TAG"

          # Clone with sparse checkout — use git directly to handle @ in tag names
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/marcfargas/odoo-toolbox.git toolbox

          cd toolbox
          git sparse-checkout set skills/odoo

          # Try to checkout the tag; fall back to default branch if tag doesn't exist yet
          if git fetch --depth 1 origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null; then
            git checkout "refs/tags/${TAG}"
            echo "Checked out tag: $TAG"
          else
            echo "Tag $TAG not found — using default branch (skills may not match exactly)"
          fi
          cd ..

      - name: Copy skills
        run: |
          rm -rf skills/odoo
          cp -r toolbox/skills/odoo skills/odoo
          rm -rf toolbox

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          if git diff --cached --quiet; then
            echo "No skill changes"
          else
            git commit -m "chore: sync skills from odoo-toolbox @${{ steps.version.outputs.version }}"
            git push
          fi
